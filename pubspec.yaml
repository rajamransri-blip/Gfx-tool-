name: gfxraaz
description: GFX Tool with Shizuku
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"   # ✅ Dart 3.5+ required for shizuku_api

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.0
  shizuku_api: ^1.0.1   # ✅ Correct latest package

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true